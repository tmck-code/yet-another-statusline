# yas.toml — yet-another-statusline configuration
#
# Copy this file to ~/.claude/yas.toml (or $CLAUDE_CONFIG_DIR/yas.toml) and
# uncomment the lines you want to change. Every knob below is shown commented
# out at its built-in default, so as-is this file changes nothing.
#
# Requires Python 3.11+ (the file is parsed with the stdlib `tomllib`). On
# Python 3.10 the file is silently skipped — environment variables work on
# every Python version.
#
# Precedence (highest wins): CLI flag → YAS_* env var → legacy-alias env var
# → this file → built-in default. So an environment variable always overrides
# the matching value here. (The one exception: a per-model `tokens.model`
# soft_limit override below beats the GLOBAL soft_limit from ANY source,
# including YAS_SOFT_LIMIT — specificity beats source precedence.)

# [layout]
# max_width = 140      # int > 0; max box width in columns (ignored when full_width = true)
# full_width = false   # bool; when true the box fills the terminal and ignores max_width
# labels = false       # bool; wide layout only — paint small superscript section
#                      #   labels into the border/separator rows above each value
#                      #   (clear/session, 5h/remain/used, input/cache/output, …).
#                      #   env: YAS_LABELS

# [tokens]
# soft_limit = 150000   # int > 0; tokens; context-fill bar / % threshold. Raise for 1M-context models.
# token_window = 60     # number > 0; seconds; rolling window for the token throughput (t/m) rate
#
# Per-model soft_limit overrides. `match` is a case-insensitive plain substring
# (no glob/regex) tested against the model id and display name. The LONGEST
# match wins; ties break by array order. A match here beats the global
# soft_limit from any source — including the YAS_SOFT_LIMIT env var. To single
# out a variant from its family, give the variant the longer, more specific
# match (below, "opus-4-8[1m]" outranks "opus" for the 1M-context model).
# model = [
#     { match = "opus",         soft_limit = 200000 },   # the whole Opus family
#     { match = "opus-4-8[1m]", soft_limit = 1000000 },  # 1M-context variant (longer match wins)
# ]

# [appearance]
# theme = "claude-dark"  # one of: claude-dark, claude-light, catppuccin-latte, catppuccin-mocha
# bg_shift = "warm"      # warm or cool; direction of the model-row gradient shift

# [appearance.glyphs]
# mode picks the richest glyph representation your terminal can display. All
# three modes preserve the box's column geometry. (env: YAS_GLYPH_MODE,
# CLI: --glyph-mode)
#   nerdfont — (default) display every glyph as-is. Full fidelity; needs a Nerd Font.
#   ascii    — replace every non-ASCII glyph with a width-1 ASCII equivalent. Maximum compatibility.
#   unicode  — replace only Nerd Font PUA icons with non-PUA Unicode; keep box/block/arrow glyphs. For good-Unicode-but-no-Nerd-Font terminals.
# mode = "nerdfont"
#
# single_width folds double-width chars (wide emoji, CJK) in dynamic content to
# width-1, for fonts that render some glyphs double-width. It is an orthogonal
# boolean and combines with any mode above. (env: YAS_GLYPH_SINGLE_WIDTH,
# CLI: --glyph-single-width)
# single_width = false
